---
- hosts: dev
  become: true

  tasks:
    - name: Install Apache2
      apt:
        name: apache2
        state: present
        update_cache: yes

    - name: Start and enable Apache2
      service:
        name: apache2
        state: started
        enabled: yes

    - name: Create index.html
      copy:
        dest: /var/www/html/index.html
        content: |
          <h1>Welcome Vinayak</h1>